    verify:
      - mvn -DskipTests compile -pl datafusion-datasource -am

  datafusion-manager:
    feature_docs_root: docs/datafusion-manager
    source_roots:
      - datafusion-manager/src/main/java
      - datafusion-manager/src/main/resources
    verify:
      - mvn -DskipTests compile -pl datafusion-manager -am

  datafusion-web:
    feature_docs_root: docs/datafusion-manager
    note: 前端功能文档与 manager 业务功能文档共址
    source_roots:
      - datafusion-web
    verify:
      - npm run build
      - npm run lint

  datafusion-scheduler-master:
