version: 1

project_conventions: docs/.sdd/project-conventions.md

modules:
  datafusion-common-data:
    feature_docs_root: 无
    source_roots:
      - datafusion-common-data/src/main/java
    verify:
      - mvn -DskipTests compile -pl datafusion-common-data -am

  datafusion-common:
    feature_docs_root: docs/datafusion-common
    source_roots:
      - datafusion-common/src/main/java
    verify:
      - mvn -DskipTests compile -pl datafusion-common -am

  datafusion-common-spring:
    feature_docs_root: 无
    source_roots:
      - datafusion-common-spring/src/main/java
    verify:
      - mvn -DskipTests compile -pl datafusion-common-spring -am

  datafusion-datasource:
    feature_docs_root: 无
    source_roots:
