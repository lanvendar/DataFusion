    verify:
      - mvn -DskipTests compile -pl datafusion-plugin/datafusion-plugin-spark-sql -am

docs:
  feature_root: docs
  language: zh-CN
  empty_marker: 无
  data_define_suffix: data-define
  design_suffix: design
  design_only:
    - path: docs/datafusion-plugin/datafusion-plugin-spider/spider-plugin-design.md
      reason: 外部运行时资源引入型插件，不定义数据库、Java 后端模型、前端模型或任务数据结构
