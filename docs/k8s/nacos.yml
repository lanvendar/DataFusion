apiVersion: v1
kind: Secret
metadata:
  name: nacos-mysql-secret
  namespace: datafusion
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: datafusion-platform
type: Opaque
stringData:
  mysql_user: "nacos"
  mysql_password: "CHANGE_ME_MYSQL_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: nacos-auth-secret
  namespace: datafusion
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: datafusion-platform
type: Opaque
stringData:
  token: "CHANGE_ME_BASE64_COMPATIBLE_TOKEN_AT_LEAST_32_BYTES"
  identity-key: "serverIdentity"
  identity-value: "CHANGE_ME_IDENTITY_VALUE"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: datafusion
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: datafusion-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nacos
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nacos
        app.kubernetes.io/part-of: datafusion-platform
    spec:
      nodeName: sz-data-a-3
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8848
            - name: client-rpc
              containerPort: 9848
            - name: raft-rpc
              containerPort: 9849
          env:
            - name: MODE
              value: standalone
            - name: JVM_XMS
              value: 512m
            - name: JVM_XMX
              value: 512m
            - name: JVM_XMN
              value: 256m
            - name: SPRING_DATASOURCE_PLATFORM
              value: mysql
            - name: MYSQL_SERVICE_HOST
              value: dev-db-mysql-instances.dev.svc.cluster.local
            - name: MYSQL_SERVICE_PORT
              value: "3306"
            - name: MYSQL_SERVICE_DB_NAME
              value: nacos_config
            - name: MYSQL_SERVICE_DB_PARAM
              value: "allowPublicKeyRetrieval=true&characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false"
            - name: MYSQL_SERVICE_USER
              valueFrom:
                secretKeyRef:
                  name: nacos-mysql-secret
                  key: mysql_user
            - name: MYSQL_SERVICE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nacos-mysql-secret
                  key: mysql_password
            - name: NACOS_AUTH_ENABLE
              value: "true"
            - name: NACOS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nacos-auth-secret
                  key: token
            - name: NACOS_AUTH_IDENTITY_KEY
              valueFrom:
                secretKeyRef:
                  name: nacos-auth-secret
                  key: identity-key
            - name: NACOS_AUTH_IDENTITY_VALUE
              valueFrom:
                secretKeyRef:
                  name: nacos-auth-secret
                  key: identity-value
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 8
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: datafusion
  labels:
    app.kubernetes.io/name: nacos
    app.kubernetes.io/part-of: datafusion-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nacos
  ports:
    - name: http
      port: 8848
      targetPort: http
    - name: client-rpc
      port: 9848
      targetPort: client-rpc
    - name: raft-rpc
      port: 9849
      targetPort: raft-rpc
