apiVersion: v1
kind: ServiceAccount
metadata:
  name: datafusion-agent
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: datafusion-agent-role
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: datafusion-agent-role
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
subjects:
  - kind: ServiceAccount
    name: datafusion-agent
    namespace: datafusion
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: datafusion-agent-role
---
apiVersion: v1
kind: Service
metadata:
  name: datafusion-agent
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datafusion-agent
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datafusion
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datafusion
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: datafusion-agent
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: seed-datafusion-shared-data
          image: datafusion-agent:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: datafusion-env
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p \
                /opt/datafusion/logs/datafusion-agent \
                /opt/datafusion/plugins/datax \
                /opt/datafusion/plugins/shell \
                /opt/datafusion/task-runtime
              if [ "${DATAFUSION_INIT_OVERWRITE:-false}" = "true" ]; then
                cp -a /opt/datafusion-builtin/. /opt/datafusion/
              else
                cp -an /opt/datafusion-builtin/. /opt/datafusion/
              fi
          volumeMounts:
            - name: datafusion-shared-data
              mountPath: /opt/datafusion/
      containers:
        - name: datafusion-agent
          image: datafusion-agent:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: datafusion-env
            - secretRef:
                name: datafusion-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: datafusion-env
                  key: DATAFUSION_ENV
            - name: NACOS_CONFIG_DATA_ID
              value: datafusion-agent-$(SPRING_PROFILES_ACTIVE)
            - name: LOG_PATH
              value: /opt/datafusion/logs/datafusion-agent
            - name: DATAFUSION_AGENT_WORKER_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATAFUSION_AGENT_WORKER_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATAFUSION_AGENT_WORKER_PORT
              value: "8081"
          volumeMounts:
            - name: datafusion-shared-data
              mountPath: /opt/datafusion/
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: datafusion-shared-data
          persistentVolumeClaim:
            claimName: datafusion-shared-data
