apiVersion: v1
kind: Service
metadata:
  name: datafusion-manager
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: manager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: manager
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datafusion-manager
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datafusion
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datafusion
        app.kubernetes.io/component: manager
    spec:
      terminationGracePeriodSeconds: 60
      initContainers:
        - name: seed-datafusion-shared-data
          image: datafusion-manager:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: datafusion-env
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p \
                /opt/datafusion/logs/datafusion-manager \
                /opt/datafusion/task-runtime
              if [ "${DATAFUSION_INIT_OVERWRITE:-false}" = "true" ]; then
                cp -a /opt/datafusion-builtin/. /opt/datafusion/
              else
                cp -an /opt/datafusion-builtin/. /opt/datafusion/
              fi
          volumeMounts:
            - name: datafusion-shared-data
              mountPath: /opt/datafusion/
      containers:
        - name: datafusion-manager
          image: datafusion-manager:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: datafusion-env
            - secretRef:
                name: datafusion-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: datafusion-env
                  key: DATAFUSION_ENV
            - name: NACOS_CONFIG_DATA_ID
              value: datafusion-manager-$(SPRING_PROFILES_ACTIVE)
          volumeMounts:
            - name: datafusion-shared-data
              mountPath: /opt/datafusion/
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: datafusion-shared-data
          persistentVolumeClaim:
            claimName: datafusion-shared-data
