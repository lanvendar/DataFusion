apiVersion: v1
kind: Service
metadata:
  name: datafusion-web
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datafusion-web
  namespace: datafusion
  labels:
    app.kubernetes.io/name: datafusion
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: datafusion
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: datafusion
        app.kubernetes.io/component: web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: datafusion-web
          image: datafusion-web:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
