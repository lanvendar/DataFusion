apiVersion: v1
kind: ConfigMap
metadata:
  name: {{configMapName}}
  namespace: {{namespace}}
  labels:
{{labels}}
data:
  {{jobFileName}}: |-
{{jobConfigData}}
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: {{applicationName}}
  namespace: {{namespace}}
  labels:
{{applicationLabels}}
  annotations:
{{annotations}}
spec:
  type: Java
  mode: cluster
  image: {{image}}
  imagePullPolicy: {{imagePullPolicy}}
  sparkVersion: {{sparkVersion}}
  mainClass: {{mainClass}}
  mainApplicationFile: {{mainApplicationFile}}
  restartPolicy:
    type: Never
  arguments:
{{arguments}}
  sparkConf:
{{sparkConf}}
  hadoopConf:
{{hadoopConf}}
  driver:
{{serviceAccountBlock}}
    cores: {{driverCores}}
    memory: {{driverMemory}}
    labels:
{{driverLabels}}
{{nodeSelectorBlock}}
    template:
      spec:
        volumes:
          - name: spark-sql-job
            configMap:
              name: {{configMapName}}
          - name: shared-plugins
            persistentVolumeClaim:
              claimName: {{sharedPvcName}}
          - name: spark-plugin
            emptyDir: {}
        initContainers:
          - name: copy-spark-plugin
            image: {{image}}
            command:
              - sh
              - -c
              - cp {{pluginAppDir}}/*.jar {{jarMountPath}}/
            volumeMounts:
              - name: shared-plugins
                mountPath: {{sharedMountPath}}
              - name: spark-plugin
                mountPath: {{jarMountPath}}
        containers:
          - name: spark-kubernetes-driver
            volumeMounts:
              - name: spark-sql-job
                mountPath: {{jobConfigMountPath}}
              - name: spark-plugin
                mountPath: {{jarMountPath}}
  executor:
    instances: {{executorInstances}}
    cores: {{executorCores}}
    memory: {{executorMemory}}
    labels:
{{executorLabels}}
{{nodeSelectorBlock}}
    template:
      spec:
        volumes:
          - name: shared-plugins
            persistentVolumeClaim:
              claimName: {{sharedPvcName}}
          - name: spark-plugin
            emptyDir: {}
        initContainers:
          - name: copy-spark-plugin
            image: {{image}}
            command:
              - sh
              - -c
              - cp {{pluginAppDir}}/*.jar {{jarMountPath}}/
            volumeMounts:
              - name: shared-plugins
                mountPath: {{sharedMountPath}}
              - name: spark-plugin
                mountPath: {{jarMountPath}}
        containers:
          - name: spark-kubernetes-executor
            volumeMounts:
              - name: spark-plugin
                mountPath: {{jarMountPath}}
