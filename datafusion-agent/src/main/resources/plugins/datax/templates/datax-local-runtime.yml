kind: "LocalProcessSpec"
workDir: "{{workDir}}"
command:
  - "{{javaBin}}"
{{jvmOptions}}  - "-Ddatax.home={{dataxHome}}"
  - "-Ddatax.log.level={{logLevel}}"
  - "-Ddatax.log.file={{logFile}}"
  - "-Ddatax.log.max.size={{logMaxSize}}"
  - "-Ddatax.log.max.index={{logMaxIndex}}"
  - "-Dlogback.configurationFile={{logbackConfigFile}}"
  - "-classpath"
  - "{{dataxJar}}"
  - "com.alibaba.datax.core.Engine"
  - "-mode"
  - "standalone"
  - "-jobid"
  - "-1"
  - "-job"
  - "{{jobFile}}"
{{dataxArgs}}env:
{{env}}  "DATAX_LOG_LEVEL": "{{logLevel}}"
  "DATAX_LOG_MAX_SIZE": "{{logMaxSize}}"
  "DATAX_LOG_MAX_INDEX": "{{logMaxIndex}}"
stdout: "{{stdout}}"
stderr: "{{stderr}}"
pluginLogUri: ""
