kind: "LocalShellProcess"
command:
  - "{{javaBin}}"
{{jvmOptions}}
  - "-Ddatax.home={{dataxHome}}"
  - "-Ddatax.log.level={{logLevel}}"
  - "-Ddatax.log.file={{logFile}}"
  - "-Ddatax.log.max.size={{logMaxSize}}"
  - "-Ddatax.log.max.index={{logMaxIndex}}"
  - "-Dlogback.configurationFile={{logConfigFile}}"
  - "-classpath"
  - "{{dataxJar}}"
  - "{{mainClass}}"
  - "-mode"
  - "{{jobMode}}"
  - "-jobid"
  - "{{jobId}}"
  - "-job"
  - "{{jobFile}}"
