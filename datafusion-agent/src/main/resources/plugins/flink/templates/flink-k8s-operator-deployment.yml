apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: {{deploymentName}}
  namespace: {{namespace}}
  labels:
{{deploymentLabels}}
  annotations:
{{annotations}}
spec:
  flinkVersion: {{operatorFlinkVersion}}
  image: {{image}}
  imagePullPolicy: {{imagePullPolicy}}
{{serviceAccountBlock}}  flinkConfiguration:
{{flinkConfiguration}}
  podTemplate:
    metadata:
      labels:
{{podLabels}}
      annotations:
{{podAnnotations}}
    spec:
{{nodeSelectorBlock}}{{imagePullSecretsBlock}}
      initContainers:
        - name: "datafusion-flink-usrlib"
          image: {{image}}
          imagePullPolicy: {{imagePullPolicy}}
          command:
            - "/bin/sh"
            - "-c"
          args:
            - |
              set -e
              mkdir -p {{usrlibPath}} /opt/flink/plugins/flink-s3-fs-hadoop
              cp -a {{flinkAppDir}}/{{flinkAppJar}} {{usrlibPath}}/
              if [ -d {{flinkAppDir}}/{{libDir}} ]; then
                cp -a {{flinkAppDir}}/{{libDir}}/flink-s3-fs-hadoop-*.jar /opt/flink/plugins/flink-s3-fs-hadoop/ 2>/dev/null || true
                find {{flinkAppDir}}/{{libDir}} -maxdepth 1 -type f -name '*.jar' ! -name 'flink-s3-fs-hadoop-*.jar' -exec cp -a {} {{usrlibPath}}/ \;
              fi
          volumeMounts:
            - name: "datafusion-flink-shared"
              mountPath: {{sharedMountPath}}
              readOnly: true
            - name: "datafusion-flink-usrlib"
              mountPath: {{usrlibPath}}
      containers:
        - name: "flink-main-container"
{{envBlock}}{{envFromBlock}}
          volumeMounts:
            - name: "datafusion-flink-usrlib"
              mountPath: {{usrlibPath}}
      volumes:
        - name: "datafusion-flink-shared"
          persistentVolumeClaim:
            claimName: {{sharedPvcName}}
        - name: "datafusion-flink-usrlib"
          emptyDir: {}
  jobManager:
{{jobManagerReplicasBlock}}    resource:
{{jobManagerResource}}
  taskManager:
{{taskManagerReplicasBlock}}    resource:
{{taskManagerResource}}
  job:
    jarURI: {{jarUri}}
    entryClass: {{mainClass}}
    args:
{{args}}
{{jobParallelismBlock}}    upgradeMode: {{upgradeMode}}
{{jobStateBlock}}
